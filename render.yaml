services:
  - type: web
    name: mission-spy-dashboard
    env: node
    region: us-east
    branch: main
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: postgres
    name: spy-db
    region: us-east
    plan: free
    ipAllowList: []
    databaseName: mission_spy
    user: postgres
    dbVersion: 15

webServices:
  - path: /
    staticDir: public
    envVars:
      - key: RENDER
        value: true

envVarKeys:
  - NODE_ENV
  - PORT
  - SECRET_KEY
  - SUPABASE_URL
  - SUPABASE_ANON_KEY
  - ADMIN_USER
  - ADMIN_PASS
  - ALLOWED_ORIGINS
  - DATABASE_URL
  - WSS_PORT
