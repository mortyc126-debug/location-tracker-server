services:
  - type: web
    name: mission-spy-dashboard
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

webServices:
  - path: /
    staticDir: src/public
    envVars:
      - key: RENDER
        value: true

envVarKeys:
  - NODE_ENV
  - PORT
  - SECRET_KEY
  - SUPABASE_URL
  - SUPABASE_ANON_KEY
